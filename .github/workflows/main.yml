name: testing the code

on:
  push:
    branches:
      - main

jobs:
  

  
  output:
    #needs: deploy-job
    runs-on: ubuntu-latest
    steps:
      - name: Generation Version
        id: version1
        run: |
          echo "build_version1=v8.0.7" >> $GITHUB_OUTPUT
          echo $GITHUB_OUTPUT
          cat "$GITHUB_OUTPUT"

      - name: Print Version
        run: |
          echo "${{ steps.version1.outputs.build_version1 }}"
          echo $GITHUB_OUTPUT
          cat "$GITHUB_OUTPUT"
          