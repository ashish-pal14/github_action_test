name: testing the code

on:
  push:
    branches:
      - main

jobs:
    
  output:
    #needs: deploy-job
    runs-on: ubuntu-latest
    outputs:
      version: ${{steps.version1.output.build_version1}}
    steps:
      - name: Generation Version
        id: version1
        run: |
          echo "build_version1=v8.0.7" >> $GITHUB_OUTPUT
          echo $GITHUB_OUTPUT
          cat "$GITHUB_OUTPUT"

      - name: Print Version
        run: |
          echo "${{ steps.version1.outputs.build_version1 }}"   
          echo $GITHUB_OUTPUT
          cat "$GITHUB_OUTPUT"
          

  outpu1:
    runs-on: ubuntu-latest
    needs: output
    steps:
      - run: |
          echo "${{needs.output.outputs.version}}"